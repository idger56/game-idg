<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GameIDG — Игры с друзьями</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<!-- ===================== АВТОРИЗАЦИЯ ===================== -->
<section id="auth-section" class="auth-page">
  <div class="auth-card">
    <h2>Добро пожаловать</h2>
    <p class="sub">Войдите или создайте аккаунт, чтобы начать</p>
    <div class="auth-fields">
      <input type="text"     id="auth-nick"  placeholder="Ник (только для регистрации)" />
      <input type="email"    id="auth-email" placeholder="Email" />
      <input type="password" id="auth-pass"  placeholder="Пароль" />
    </div>
    <div class="auth-btns">
      <button class="btn btn-primary btn-lg" id="btn-login">Войти</button>
      <button class="btn btn-ghost btn-lg"   id="btn-register">Создать аккаунт</button>
    </div>
    <p class="error-text mt-8" id="auth-error"></p>
  </div>
</section>

<!-- ===================== ОСНОВНОЙ КОНТЕНТ ===================== -->
<main id="main-section" class="hidden">

  <!-- HERO СЛАЙДЕР -->
  <div class="hero-slider" id="hero-slider">
    <div class="hero-slides" id="hero-slides"></div>
    <button class="hero-arrow hero-prev" id="hero-prev">‹</button>
    <button class="hero-arrow hero-next" id="hero-next">›</button>
    <div class="hero-dots" id="hero-dots"></div>
  </div>

  <!-- FEATURED / ПОПУЛЯРНОЕ -->
  <section class="featured-section" id="featured-section">
    <div class="featured-inner">
      <div class="featured-header">
        <h2 class="featured-title">⭐ Популярное и рекомендуемое</h2>
      </div>
      <div class="featured-carousel-wrap">
        <button class="feat-arrow feat-prev" id="feat-prev">‹</button>
        <div class="featured-carousel" id="featured-carousel"></div>
        <button class="feat-arrow feat-next" id="feat-next">›</button>
      </div>
    </div>
  </section>

  <!-- КАТАЛОГ -->
  <div class="page-content">

    <div class="catalog-header">
      <div>
        <h1 class="page-title">🎮 Каталог игр</h1>
        <p class="page-sub">Многопользовательские и кооперативные игры</p>
      </div>
      <div class="flex-gap">
        <button id="btn-random" class="btn btn-ghost">🎲 Случайная игра</button>
        <button id="btn-toggle-add" class="btn btn-success hidden">➕ Добавить игру</button>
      </div>
    </div>

    <!-- Форма добавления (только для админа) -->
    <div id="add-form-wrap" class="admin-form-wrap hidden">
      <h3>➕ Добавить игру</h3>
      <form id="add-game-form" style="display:flex;flex-direction:column;gap:14px">
        <div class="form-group"><label class="form-label">Название</label>
          <input type="text" id="f-title" placeholder="Название игры" required /></div>
        <div class="form-group"><label class="form-label">Описание</label>
          <textarea id="f-desc" rows="3" placeholder="Описание игры..."></textarea></div>
        <div class="form-group"><label class="form-label">Жанры (Ctrl+клик)</label>
          <select id="f-category" multiple class="multi-select" required></select></div>
        <div class="form-group"><label class="form-label">Ссылка</label>
          <input type="url" id="f-link" placeholder="https://..." required /></div>
        <div class="form-group"><label class="form-label">URL обложки</label>
          <input type="url" id="f-image" placeholder="https://..." required /></div>
        <div class="form-group"><label class="form-label">Статус</label>
          <select id="f-status" required>
            <option value="" disabled selected>Выберите статус</option>
            <option>Пройдена</option><option>В процессе</option><option>В планах</option>
          </select></div>
        <div class="form-group">
          <label class="form-label">Показывать в слайдере?</label>
          <select id="f-featured">
            <option value="">Нет</option>
            <option value="featured">Да — в слайдере</option>
          </select>
        </div>
        <button type="submit" class="btn btn-success">Добавить игру</button>
      </form>
    </div>

    <!-- Фильтры -->
    <div class="filters-bar">
      <input type="text" id="filter-search" placeholder="🔍 Поиск по названию..." />
      <select id="filter-category"><option value="">Все жанры</option></select>
      <select id="filter-status">
        <option value="">Все статусы</option>
        <option>Пройдена</option><option>В процессе</option><option>В планах</option>
      </select>
      <select id="filter-sort">
        <option value="default">Сортировка: по умолчанию</option>
        <option value="rating">По рейтингу ↓</option>
        <option value="title">По названию А-Я</option>
      </select>
    </div>

    <!-- Сетка игр -->
    <div id="games-grid" class="games-grid">
      <div class="spinner"></div>
    </div>
  </div>
</main>

<!-- КАРТОЧКА ИГРЫ (модалка) -->
<div class="game-modal-overlay hidden" id="game-modal-overlay">
  <div class="game-modal" id="game-modal">
    <button class="game-modal-close" id="game-modal-close">✕</button>
    <div id="game-modal-content"></div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>
<script type="module" src="js/index.js"></script>
</body>
</html>

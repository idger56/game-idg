<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GameIDG — Инвентарь</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/cases.css" />
</head>
<body>
<div class="theme-deco"></div>

<div id="inv-auth" class="page-content">
  <div class="empty-state" style="margin-top:80px">
    <div class="icon">🎒</div>
    <p>Войдите, чтобы посмотреть инвентарь</p>
    <a href="index.html" class="btn btn-primary" style="margin-top:16px">Войти</a>
  </div>
</div>

<div id="inv-main" class="hidden">
  <div class="page-content">

    <div class="cases-page-header">
      <div>
        <h1 class="page-title">🎒 Инвентарь</h1>
        <p class="page-sub">Ваши предметы, витрина и контракты</p>
      </div>
      <div class="balance-chip" id="balance-display-inv">💎 — PS</div>
    </div>

    <!-- Фильтры -->
    <div class="filters-bar">
      <input type="text" id="inv-search" placeholder="🔍 Поиск по названию..." />
      <select id="inv-filter-rarity">
        <option value="">Все редкости</option>
        <option value="common">Обычный</option>
        <option value="rare">Редкий</option>
        <option value="epic">Эпический</option>
        <option value="legendary">Легендарный</option>
        <option value="exclusive">Эксклюзив</option>
      </select>
      <select id="inv-filter-type">
        <option value="">Все типы</option>
        <option value="frame">🖼 Рамка</option>
        <option value="background">🌌 Фон</option>
        <option value="icon">⭐ Иконка</option>
      </select>
    </div>

    <!-- Контракт-панель -->
    <div class="contract-panel hidden" id="contract-panel">
      <div class="contract-panel-inner">
        <div class="contract-info">
          <span class="contract-title">🔧 Контракт</span>
          <span id="contract-counter">0 / 5</span>
          <span id="contract-result-rarity" style="font-weight:700"></span>
        </div>
        <div class="contract-actions">
          <button class="btn btn-primary btn-sm" id="btn-make-contract" disabled>✨ Выполнить контракт</button>
          <button class="btn btn-ghost btn-sm" id="btn-clear-contract">✕ Сбросить</button>
        </div>
      </div>
      <p class="contract-hint">Выберите 5 предметов одной редкости → получите 1 предмет выше</p>
    </div>

    <!-- Сетка инвентаря -->
    <div id="inv-grid" class="inv-grid">
      <div class="spinner"></div>
    </div>

  </div>
</div>

<div class="toast-container" id="toast-container"></div>
<script type="module" src="js/inventory-page.js"></script>
</body>
</html>
